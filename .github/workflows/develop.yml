name: "DEV DEPLOY"

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      aws-assume-role-arn: "arn:aws:iam::775322166386:role/GitHubAction-AssumeRoleWithAction"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "ae-edu-terraform-state-dev"
      aws-lock-dynamodb-table: "ae-edu-terraform-lock-dev"